<!doctype html>
<html>
<head>
<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0b0b0b;
  color: white;
}

.app {
  display: flex;
  height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 250px;
  background: #0f0f0f;
  padding: 20px;
  border-right: 1px solid #222;
}

.sidebar input {
  width: 100%;
  padding: 10px;
  background: #1a1a1a;
  border: none;
  color: white;
  border-radius: 6px;
}

/* CHAT ITEM */
.chat-item {
  background: #1a1a1a;
  padding: 10px;
  margin-top: 10px;
  border-radius: 6px;
  cursor: pointer;
  transition: 0.2s;
}

.chat-item:hover {
  background: #00ffcc22;
}

/* DASHBOARD */
.dashboard {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  padding: 25px;
}

/* CARD */
.card {
  background: #121212;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 0 10px #000;
}

/* GAUGE */
.gauge {
  width: 160px;
  height: 160px;
  border-radius: 50%;
  margin: auto;
  display: flex;
  align-items: center;
  justify-content: center;
}

.gauge-inner {
  width: 120px;
  height: 120px;
  background: #0b0b0b;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
}

/* BUTTONS */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.03);
}

.quiz-btn {
  background: linear-gradient(45deg, orange, #ffcc00);
  color: black;
}

.submit-btn {
  background: lime;
  color: black;
}

.close-btn {
  background: red;
}

/* INPUTS */
input[type="text"],
input[type="number"],
input[type="file"] {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  background: #1a1a1a;
  border: none;
  color: white;
  border-radius: 6px;
}

/* AI PANEL */
.ai-panel {
  width: 320px;
  background: #0f0f0f;
  padding: 20px;
  border-left: 1px solid #222;
  display: flex;
  flex-direction: column;
}

.ai-panel input[type="text"],
.ai-panel input[type="number"]{
  background: #000;
}

#chatBox {
  flex: 1;
  overflow-y: auto;
  margin: 10px 0;
}

/* MESSAGES */
.message {
  padding: 10px;
  margin: 5px 0;
  border-radius: 6px;
}

.user {
  background: #00aaff33;
}

.ai {
  background: #00ffcc33;
}

/* REMINDERS */
.reminder-item {
  background: #1a1a1a;
  padding: 8px;
  margin-top: 5px;
  border-radius: 6px;
}

/* QUIZ MODAL */
.quiz-modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  display: none;
  justify-content: center;
  align-items: center;
}

.quiz-box {
  background: #121212;
  padding: 25px;
  width: 60%;
  max-height: 80%;
  overflow-y: auto;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="app">

  <!-- LEFT -->
  <div class="sidebar">
    <h3>Chats</h3>
    <input placeholder="Search...">
    <div id="chatList"></div>
  </div>

  <!-- CENTER -->
  <div class="dashboard">

    <div class="card">
      <h3>Quiz Score</h3>

      <div class="gauge" id="gauge">
        <div class="gauge-inner" id="gaugeText">0%</div>
      </div>

      <button class="quiz-btn" onclick="startQuiz()">Take Quiz</button>
    </div>

    <div class="card">
      <h3>Ranking</h3>
      <p>1. You - 80 pts</p>
      <p>2. D.K - 60 pts</p>
    </div>

    <div class="card">
      <h3>Reminder</h3>
      <button onclick="setReminder()">Set Reminder</button>
      <div id="reminderList"></div>
    </div>

    <div class="card">
      <h3>To-Do</h3>
      <input id="todoInput">
      <button onclick="addTodo()">Add</button>
      <div id="todoList"></div>
    </div>

  </div>

  <!-- RIGHT -->
  <div class="ai-panel">
    <h3>AI Tutor</h3>

    <form id="uploadForm">
      <input type="text"name="title" placeholder="Topic" required>
      <input type="number" name="time" placeholder="Time (minutes)" required>
      <input type="file" name="file" required>
      <button>Upload</button>
    </form>

    <div id="chatBox"></div>

    <input id="userInput">
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<!-- QUIZ MODAL -->
<div id="quizModal" class="quiz-modal">
  <div class="quiz-box">
    <div id="quizBox"></div>
    <button class="submit-btn" onclick="submitQuiz()">Submit</button>
    <button class="close-btn" onclick="closeQuiz()">Close</button>
  </div>
</div>

<script>

let currentLearningId = null;

/* GAUGE */
function updateGauge(score, total) {
  const percent = total ? (score / total) * 100 : 0;
  const deg = (percent / 100) * 360;

  document.getElementById("gauge").style.background =
    `conic-gradient(lime ${deg}deg, #222 ${deg}deg)`;

  document.getElementById("gaugeText").innerText =
    Math.round(percent) + "%";
}

/* QUIZ */
async function startQuiz() {
  const res = await fetch("/generate_quiz", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ learning_id: currentLearningId })
  });

  const data = await res.json();

  const quizBox = document.getElementById("quizBox");
  quizBox.innerHTML = "";

  data.quiz.forEach((q, i) => {
    const div = document.createElement("div");

    div.innerHTML = `
      <p>${i+1}. ${q.question}</p>
      ${q.options.map(opt => `
        <label>
          <input type="radio" name="q${i}" value="${opt}">
          ${opt}
        </label><br>
      `).join("")}
      <hr>
    `;

    quizBox.appendChild(div);
  });

  document.getElementById("quizModal").style.display = "flex";
}

function closeQuiz() {
  document.getElementById("quizModal").style.display = "none";
}

/* SUBMIT */
async function submitQuiz() {
  let answers = [];

  document.querySelectorAll("input[type='radio']:checked").forEach(el => {
    answers.push(el.value);
  });

  const res = await fetch("/submit_quiz", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ answers, learning_id: currentLearningId })
  });

  const data = await res.json();

  alert(`Score: ${data.score}/${data.total}`);
  updateGauge(data.score, data.total);
}

/* REMINDERS */
async function loadReminders() {
  const res = await fetch("/notifications");
  const data = await res.json();

  const box = document.getElementById("reminderList");
  box.innerHTML = "";

  data.forEach(r => {
    const div = document.createElement("div");
    div.innerText = r.message;
    box.appendChild(div);
  });
}

/* INIT */
updateGauge(7,10);
loadReminders();

</script>
</body>
</html>
