<!doctype html>
<html>
<head>
<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f0f0f;
  color: white;
}

.app {
  display: flex;
  height: 100vh;
}

/* LEFT SIDEBAR */
.sidebar {
  width: 250px;
  background: #111;
  padding: 15px;
  overflow-y: auto;
}

/* CENTER GRID */
.dashboard {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-auto-rows: minmax(200px, auto);
  gap: 15px;
  padding: 20px;
}

/* RIGHT AI */
.ai-panel {
  width: 320px;
  background: #111;
  padding: 15px;
  display: flex;
  flex-direction: column;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  border-radius: 10px;
}

/* GAUGE */
.gauge {
  width: 150px;
  height: 150px;
  border-radius: 50%;
  background: conic-gradient(lime 0deg, #222 0deg);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: auto;
}

.gauge-inner {
  width: 110px;
  height: 110px;
  background: #0f0f0f;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}

/* CHAT */
#chatBox {
  flex: 1;
  overflow-y: auto;
  margin: 10px 0;
}

.message {
  padding: 8px;
  margin: 5px 0;
  border-radius: 6px;
}

.user { background: #00aaff33; }
.ai { background: #00ffcc33; }

/* INPUT */
input, button {
  width: 100%;
  margin: 5px 0;
  padding: 10px;
  border: none;
}

button {
  background: #00ffcc;
  cursor: pointer;
}

.quiz-btn {
  margin-top: 10px;
  background: orange;
}

/* reminder list */
.reminder-item {
  background: #222;
  padding: 8px;
  margin-top: 5px;
  border-radius: 5px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="app">

  <!-- 🧠 CHAT SIDEBAR -->
  <div class="sidebar">
    <h3>Chats</h3>
    <input placeholder="Search...">
    <div id="chatList"></div>
  </div>

  <!-- 📊 DASHBOARD -->
  <div class="dashboard">

    <!-- 🎯 SCORE + QUIZ -->
    <div class="card">
      <h3>Quiz Score</h3>

      <div class="gauge" id="gauge">
        <div class="gauge-inner" id="gaugeText">0%</div>
      </div>

      <button class="quiz-btn" onclick="startQuiz()">Take Quiz</button>

      <div id="quizBox"></div>
    </div>

    <!-- 🏆 RANKING -->
    <div class="card">
      <h3>Ranking</h3>
      <p>1. You - 80 pts</p>
      <p>2. Alex - 60 pts</p>
    </div>

    <!-- ⏰ REMINDER -->
    <div class="card">
      <h3>Reminder</h3>
      <button onclick="setReminder()">Set Reminder</button>

      <div id="reminderList"></div>
    </div>

    <!-- 📝 TODO -->
    <div class="card">
      <h3>To-Do</h3>
      <input id="todoInput" placeholder="Task">
      <button onclick="addTodo()">Add</button>
      <div id="todoList"></div>
    </div>

  </div>

  <!-- 🤖 AI PANEL -->
  <div class="ai-panel">
    <h3>AI Tutor</h3>

    <form id="uploadForm">
      <input type="text" name="title" placeholder="Topic" required>
      <input type="number" name="time" placeholder="Time" required>
      <input type="file" name="file" required>
      <button>Upload</button>
    </form>

    <div id="chatBox"></div>

    <input id="userInput" placeholder="Ask anything...">
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<script>

let currentLearningId = null;

/* 🎯 GAUGE */
function updateGauge(score, total) {
  const percent = (score / total) * 100;
  const deg = (percent / 100) * 360;

  document.getElementById("gauge").style.background =
    `conic-gradient(lime ${deg}deg, #222 ${deg}deg)`;

  document.getElementById("gaugeText").innerText =
    Math.round(percent) + "%";
}

/* 📄 UPLOAD */
document.getElementById("uploadForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const formData = new FormData(this);

  const res = await fetch("/upload", {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  if (data.success) {
    currentLearningId = data.learning_id;

    document.getElementById("chatBox").innerHTML =
      `<p><b>Summary:</b> ${data.summary}</p>`;
  }
});

/* 💬 CHAT */
async function sendMessage() {
  const input = document.getElementById("userInput");
  const msg = input.value;

  if (!msg) return;

  addMessage("user", msg);
  input.value = "";

  const res = await fetch("/ask_ai", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      message: msg,
      learning_id: currentLearningId
    })
  });

  const data = await res.json();
  addMessage("ai", data.reply);
}

function addMessage(role, text) {
  const div = document.createElement("div");
  div.className = "message " + role;
  div.innerText = text;

  document.getElementById("chatBox").appendChild(div);
}

/* 📝 TODO */
function addTodo() {
  const val = document.getElementById("todoInput").value;
  if (!val) return;

  const div = document.createElement("div");
  div.innerText = val;

  document.getElementById("todoList").appendChild(div);
}

/* ⏰ REMINDER */
async function setReminder() {
  const min = prompt("Minutes?");
  if (!min) return;

  await fetch("/set_reminder", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      learning_id: currentLearningId,
      minutes: min
    })
  });

  alert("Reminder set!");
  loadReminders();
}

/* 📥 LOAD REMINDERS */
async function loadReminders() {
  const res = await fetch("/get_reminders");
  const data = await res.json();

  const box = document.getElementById("reminderList");
  box.innerHTML = "";

  data.forEach(r => {
    const div = document.createElement("div");
    div.className = "reminder-item";
    div.innerText = `⏰ ${r.minutes} min reminder`;
    box.appendChild(div);
  });
}

/* 🧠 QUIZ */
async function startQuiz() {
  if (!currentLearningId) {
    alert("Upload first!");
    return;
  }

  const res = await fetch("/generate_quiz", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      learning_id: currentLearningId
    })
  });

  const data = await res.json();
  document.getElementById("quizBox").innerText = data.quiz;
}

/* INIT */
updateGauge(7, 10);
loadReminders();

</script>

</body>
</html>
